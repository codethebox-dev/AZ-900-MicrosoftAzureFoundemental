title: "AZ-900: Azure Fundamentals"
description: "Microsoft Azure Fundamentals certification study documentation — modules, labs, and practice questions."
baseurl: "/az-900-docs"
url: "https://codethebox-dev.github.io"

# Use remote_theme instead of theme: — works with GitHub Actions deploy
# (theme: just-the-docs only works when just-the-docs gem is installed locally)
remote_theme: just-the-docs/just-the-docs@v0.8.2

# Author
author:
  name: "Codethebox Learning"

# Just the Docs configuration
color_scheme: light
search_enabled: true
heading_anchors: true
permalink: pretty

aux_links:
  "View on GitHub":
    - "https://github.com/codethebox-dev/AZ-900-MicrosoftAzureFoundemental"
aux_links_new_tab: true

footer_content: "AZ-900 Azure Fundamentals Docs &copy; 2025 MyOrg Learning. MIT License."

back_to_top: true
back_to_top_text: "Back to top"

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/codethebox-dev/AZ-900-MicrosoftAzureFoundemental"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  modules:
    permalink: "/:collection/:path/"
    output: true
  labs:
    permalink: "/:collection/:path/"
    output: true

defaults:
  - scope:
      path: ""
      type: modules
    values:
      layout: module
      nav_order: 2
  - scope:
      path: ""
      type: labs
    values:
      layout: lab
      nav_order: 3
