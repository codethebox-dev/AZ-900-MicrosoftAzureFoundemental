title: "AZ-900: Azure Fundamentals"
description: "Microsoft Azure Fundamentals certification study documentation — modules, labs, and practice questions."
baseurl: "/AZ-900-MicrosoftAzureFoundemental"
url: "https://codethebox-dev.github.io"

# Fully self-contained — no theme: or remote_theme: needed.
# All layouts live in _layouts/, CSS in assets/css/, JS in assets/js/.

author:
  name: "MyOrg Learning"

heading_anchors: true
permalink: pretty

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  modules:
    permalink: "/:collection/:path/"
    output: true
  labs:
    permalink: "/:collection/:path/"
    output: true

defaults:
  - scope:
      path: ""
      type: modules
    values:
      layout: module
  - scope:
      path: ""
      type: labs
    values:
      layout: lab
