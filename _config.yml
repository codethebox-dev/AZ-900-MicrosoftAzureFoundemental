title: "AZ-900: Azure Fundamentals"
description: "Microsoft Azure Fundamentals certification study documentation — modules, labs, and practice questions."
baseurl: "/az-900-docs"
url: "https://codethebox-dev.github.io"

theme: just-the-docs

# Author
author:
  name: "Codethebox Learning"

# Just the Docs settings
color_scheme: light
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

heading_anchors: true
permalink: pretty
aux_links:
  "View on GitHub":
    - "https://github.com/codethebox-dev/AZ-900-MicrosoftAzureFoundemental"
aux_links_new_tab: true

nav_external_links:
  - title: Microsoft Learn
    url: https://learn.microsoft.com/en-us/training/paths/az-900-describe-cloud-concepts/
    hide_icon: false

footer_content: "AZ-900 Azure Fundamentals Docs &copy; 2025 codethebox-dev Learning. Distributed under MIT License."

back_to_top: true
back_to_top_text: "Back to top"

last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/codethebox-dev/AZ-900-MicrosoftAzureFoundemental"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false

collections:
  modules:
    permalink: "/:collection/:path/"
    output: true
  labs:
    permalink: "/:collection/:path/"
    output: true

defaults:
  - scope:
      path: ""
      type: modules
    values:
      layout: module
      nav_order: 2
  - scope:
      path: ""
      type: labs
    values:
      layout: lab
      nav_order: 3
